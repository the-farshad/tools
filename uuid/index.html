<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>UUID Generator | Tools</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/5.0.0/normalize.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Serif:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;600&family=Lora:ital,wght@0,400;0,600;1,400&family=Ubuntu:wght@400;700&family=VT323&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="../assets/Farshad-Ghorbani.svg">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="stylesheet" href="../styles/style.css">
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (t === 'dark' || t === 'light' || t === 'sepia') document.documentElement.setAttribute('data-theme', t);
        var f = localStorage.getItem('font');
        if (['vt323','serif','plex-serif','sans','ubuntu','atkinson'].indexOf(f) >= 0) document.documentElement.setAttribute('data-font', f);
      } catch (e) {}
    })();
  </script>
</head>

<body>
  <main class="page">
    <header class="page-header">
      <a href="../index.html" class="back-link">&larr; tools</a>
      <h1>UUID Generator</h1>
    </header>

    <div class="reader-controls">
      <div class="seg" data-control="theme" role="group" aria-label="Theme">
        <button type="button" data-value="light" title="Light">&#9728;</button>
        <button type="button" data-value="sepia" title="Sepia">&#9681;</button>
        <button type="button" data-value="dark"  title="Dark">&#9790;</button>
      </div>
      <div class="seg" data-control="font" role="group" aria-label="Font">
        <button type="button" data-value="vt323"      style="font-family:'VT323',monospace">Aa</button>
        <button type="button" data-value="serif"      style="font-family:'Lora',Georgia,serif">Aa</button>
        <button type="button" data-value="plex-serif" style="font-family:'IBM Plex Serif',Georgia,serif">Aa</button>
        <button type="button" data-value="sans"       style="font-family:'Inter',system-ui,sans-serif">Aa</button>
        <button type="button" data-value="ubuntu"     style="font-family:'Ubuntu',system-ui,sans-serif">Aa</button>
        <button type="button" data-value="atkinson"   style="font-family:'Atkinson Hyperlegible',system-ui,sans-serif">Aa</button>
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label for="version">Version</label>
        <select id="version">
          <option value="4" selected>v4 (random)</option>
          <option value="7">v7 (time-ordered)</option>
        </select>
      </div>
      <div class="field">
        <label for="count">Count</label>
        <input id="count" type="number" min="1" max="500" value="10" />
      </div>
      <div class="field">
        <label for="case">Case</label>
        <select id="case">
          <option value="lower" selected>lowercase</option>
          <option value="upper">UPPERCASE</option>
        </select>
      </div>
    </div>

    <div class="action-row">
      <button class="btn primary" id="generate">Generate</button>
      <button class="btn" id="copy">Copy all</button>
    </div>

    <div id="status"></div>

    <pre class="output" id="output" style="min-height:160px"></pre>
  </main>

  <footer class="site-footer">
    Built by <a href="https://thefarshad.com">Farshad</a> &middot;
    <a href="https://github.com/the-farshad/tools">source on GitHub</a>
  </footer>

  <script src="../scripts/theme.js"></script>
  <script src="./uuid.js"></script>
</body>

</html>
